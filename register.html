<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShoeStore - Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <a href="index.html">ShoeStore</a>
        </div>
        <div class="nav">
            <a href="index.html">Главная</a>
            <a href="login.html">Вход</a>
            <a href="register.html" class="active">Регистрация</a>
            <a href="profile.html">Профиль</a>
            <a href="favorites.html">Избранное</a>
            <a href="cart.html">Корзина</a>
        </div>
    </div>

    <div class="container">
        <div class="form-container">
            <h2>Регистрация</h2>
            <form id="registerForm" onsubmit="event.preventDefault(); register(document.getElementById('name').value, document.getElementById('email').value, document.getElementById('password').value)">
    <div class="form-group">
        <label>Имя:</label>
        <input type="text" id="name" placeholder="Введите имя" required>
    </div>
    <div class="form-group">
        <label>Email:</label>
        <input type="email" id="email" placeholder="Введите email" required>
    </div>
    <div class="form-group">
        <label>Пароль:</label>
        <input type="password" id="password" placeholder="Придумайте пароль" required>
    </div>
    <button type="submit" class="btn btn-success" style="width: 100%;">Зарегистрироваться</button>
</form>
            <p style="text-align: center; margin-top: 20px;">
                Уже есть аккаунт? <a href="login.html">Войдите</a>
            </p>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2024 ShoeStore - Магазин обуви. Все права защищены.</p>
    </div>

    <script src="script-with-backend.js"></script>
</body>
</html>
