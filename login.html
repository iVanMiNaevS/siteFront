<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta
			name="description"
			content="Войдите в аккаунт ShoeStore, чтобы получить доступ к заказам, избранному и персональным скидкам на кроссовки."
		/>
		<meta property="og:title" content="Вход — ShoeStore" />
		<meta
			property="og:description"
			content="Войдите в аккаунт, чтобы получить доступ к заказам и избранному."
		/>
		<meta property="og:url" content="https://ivanminaevs.github.io/siteFront/login" />
		<meta property="og:type" content="website" />
		<title>ShoeStore - Вход</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="header">
			<div class="logo">
				<a href="index.html">ShoeStore</a>
			</div>
			<div class="nav">
				<a href="index.html">Главная</a>
				<a href="login.html" class="active">Вход</a>
				<a href="register.html">Регистрация</a>
				<a href="profile.html">Профиль</a>
				<a href="favorites.html">Избранное</a>
				<a href="cart.html">Корзина</a>
			</div>
		</div>

		<div class="container">
			<div class="form-container">
				<h2>Вход в аккаунт</h2>
				<form
					id="loginForm"
					onsubmit="
						event.preventDefault();
						login(
							document.getElementById('email').value,
							document.getElementById('password').value,
						);
					"
				>
					<div class="form-group">
						<label>Email:</label>
						<input type="email" id="email" placeholder="Введите email" required />
					</div>
					<div class="form-group">
						<label>Пароль:</label>
						<input type="password" id="password" placeholder="Введите пароль" required />
					</div>
					<button type="submit" class="btn btn-primary" style="width: 100%">Войти</button>
				</form>
				<p style="text-align: center; margin-top: 20px">
					Нет аккаунта? <a href="register.html">Зарегистрируйтесь</a>
				</p>
			</div>
		</div>

		<div class="footer">
			<p>&copy; 2024 ShoeStore - Магазин обуви. Все права защищены.</p>
		</div>

		<script src="script-with-backend.js"></script>
	</body>
</html>
